<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五十音大冒險 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0c1a;
  --bg2: #1a1530;
  --card: #231e3a;
  --card2: #2d2650;
  --sakura: #ff6b9d;
  --matcha: #00e5c8;
  --yuzu: #ffd93d;
  --coral: #ff6b6b;
  --purple: #a78bfa;
  --text: #f0eaff;
  --muted: #7a6fa0;
  --glow-pink: rgba(255,107,157,0.4);
  --glow-teal: rgba(0,229,200,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; cursor:none; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; overflow-x:hidden; }

/* CURSOR */
#cur { width:16px;height:16px;background:var(--sakura);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transition:transform .1s;mix-blend-mode:screen; }
#cur2 { width:36px;height:36px;border:2px solid var(--sakura);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:transform .25s;opacity:.4; }

/* STARS BG */
.stars { position:fixed;inset:0;pointer-events:none;z-index:0; }
.star { position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); }
@keyframes twinkle { 0%,100%{opacity:.1;transform:scale(1)} 50%{opacity:.8;transform:scale(1.3)} }

/* PARTICLES */
#particles { position:fixed;inset:0;pointer-events:none;z-index:1; }
.particle { position:absolute;pointer-events:none;animation:particleFly var(--dur,2s) ease-out forwards; font-size:var(--fs,1.2rem); }
@keyframes particleFly { 0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)} 100%{opacity:0;transform:translate(var(--tx,0px),var(--ty,-80px)) scale(.3) rotate(360deg)} }

/* LAYOUT */
.screen { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh;transition:opacity .4s,transform .4s;z-index:10; }
.screen.hidden { opacity:0;pointer-events:none;transform:scale(.95); }

/* ===== HOME SCREEN ===== */
#homeScreen { gap:0; }
.home-logo {
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:clamp(3rem,10vw,6rem);
  font-weight:900;
  background:linear-gradient(135deg,var(--sakura),var(--purple),var(--matcha));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-align:center; line-height:1.1; margin-bottom:8px;
  filter:drop-shadow(0 0 30px var(--glow-pink));
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 20px var(--glow-pink))} 50%{filter:drop-shadow(0 0 50px var(--glow-pink)) drop-shadow(0 0 80px var(--glow-teal))} }
.home-sub { color:var(--matcha); font-size:1rem; margin-bottom:40px; letter-spacing:.2em; text-align:center; opacity:.8; }
.mode-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:100%; max-width:340px; margin-bottom:28px; }
.mode-btn {
  background:var(--card); border:2px solid var(--card2);
  border-radius:16px; padding:18px 12px; text-align:center;
  transition:all .2s; position:relative; overflow:hidden;
}
.mode-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .2s; }
.mode-btn:hover { transform:translateY(-4px); border-color:var(--sakura); box-shadow:0 8px 30px var(--glow-pink); }
.mode-btn:hover::before { opacity:1; background:radial-gradient(ellipse at center,rgba(255,107,157,.1),transparent); }
.mode-btn.selected { border-color:var(--matcha); background:rgba(0,229,200,.1); box-shadow:0 0 20px var(--glow-teal); }
.mode-icon { font-size:2rem; margin-bottom:6px; }
.mode-name { font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:.95rem; }
.mode-count { font-size:.75rem; color:var(--muted); margin-top:2px; }

.diff-row { display:flex; gap:10px; margin-bottom:28px; }
.diff-btn {
  padding:10px 24px; border-radius:50px;
  background:var(--card); border:2px solid var(--card2);
  color:var(--muted); font-weight:700; font-size:.85rem;
  transition:all .2s;
}
.diff-btn:hover,.diff-btn.selected { color:var(--yuzu); border-color:var(--yuzu); background:rgba(255,217,61,.1); box-shadow:0 0 16px rgba(255,217,61,.3); }

.start-btn {
  background:linear-gradient(135deg,var(--sakura),#c84b8a);
  color:white; border:none; border-radius:50px;
  padding:18px 60px; font-family:'Zen Maru Gothic',sans-serif;
  font-size:1.2rem; font-weight:700;
  box-shadow:0 6px 30px var(--glow-pink);
  transition:all .2s; letter-spacing:.05em;
}
.start-btn:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 12px 40px var(--glow-pink); }
.start-btn:active { transform:scale(.97); }

.leaderboard-link {
  margin-top:12px; background:transparent;
  border:1.5px solid rgba(167,139,250,.35);
  color:var(--purple); font-size:.85rem; font-weight:700;
  padding:10px 28px; border-radius:50px;
  text-decoration:none; opacity:.8; transition:all .2s;
}
.leaderboard-link:hover { opacity:1; border-color:var(--purple); box-shadow:0 0 16px rgba(167,139,250,.3); }

/* ===== GAME SCREEN ===== */
#gameScreen { justify-content:flex-start; padding-top:80px; gap:0; }
.game-header {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 28px;
  background:rgba(15,12,26,.85); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  z-index:50;
}
.hud-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
.hud-label { font-size:.65rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.hud-value { font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); }
.hud-value.score-val { color:var(--yuzu); }
.hud-value.streak-val { color:var(--sakura); }
.hud-value.timer-val { color:var(--matcha); }
.hud-value.timer-warn { color:var(--coral); animation:timerBlink .5s ease-in-out infinite; }
@keyframes timerBlink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* TIMER BAR */
.timer-bar-wrap { position:fixed; top:64px; left:0; right:0; height:4px; background:rgba(255,255,255,.06); z-index:50; }
.timer-bar { height:100%; background:linear-gradient(90deg,var(--matcha),var(--sakura)); transition:width .1s linear; border-radius:0 2px 2px 0; box-shadow:0 0 8px var(--glow-teal); }

.combo-banner {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,var(--sakura),var(--purple));
  color:white; padding:6px 24px; border-radius:50px;
  font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:.85rem;
  z-index:50; opacity:0; transition:opacity .3s;
  box-shadow:0 4px 20px var(--glow-pink);
}
.combo-banner.show { opacity:1; }

.question-area { width:100%; max-width:520px; text-align:center; margin-bottom:20px; }
.category-tag {
  display:inline-block; padding:4px 14px; border-radius:20px;
  font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  margin-bottom:20px;
}

.kana-card {
  background:var(--card);
  border:2px solid rgba(255,255,255,.08);
  border-radius:28px; padding:32px 40px 24px;
  margin-bottom:20px; position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.kana-char {
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:clamp(5rem,18vw,9rem);
  font-weight:900; line-height:1;
  display:block; animation:charPop .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes charPop { from{transform:scale(.5) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
.kana-type-hint { color:var(--muted); font-size:.8rem; margin-top:8px; }

.progress-dots { display:flex; gap:6px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; max-width:300px; margin-left:auto; margin-right:auto; }
.prog-dot { width:8px;height:8px;border-radius:50%;background:var(--card2);transition:all .3s; }
.prog-dot.done-correct { background:var(--matcha); box-shadow:0 0 6px var(--glow-teal); }
.prog-dot.done-wrong { background:var(--coral); }
.prog-dot.current { background:var(--sakura); transform:scale(1.4); box-shadow:0 0 8px var(--glow-pink); }

.options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:100%; max-width:520px; }
.opt-btn {
  background:var(--card); border:2px solid rgba(255,255,255,.1);
  border-radius:16px; padding:18px 12px; color:var(--text);
  font-family:'Noto Sans TC',sans-serif; font-size:1.05rem; font-weight:700;
  transition:all .18s; position:relative; overflow:hidden;
}
.opt-btn::after { content:''; position:absolute; inset:0; opacity:0; border-radius:14px; transition:opacity .2s; }
.opt-btn:hover:not(:disabled) { border-color:var(--purple); box-shadow:0 0 20px rgba(167,139,250,.3); transform:translateY(-2px); }
.opt-btn:hover:not(:disabled)::after { opacity:1; background:rgba(167,139,250,.08); }
.opt-btn.correct-anim { border-color:var(--matcha)!important; background:rgba(0,229,200,.15)!important; color:var(--matcha)!important; box-shadow:0 0 30px var(--glow-teal)!important; animation:correctPulse .5s ease; }
.opt-btn.wrong-anim { border-color:var(--coral)!important; background:rgba(255,107,107,.15)!important; color:var(--coral)!important; animation:wrongShake .4s ease; }
@keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

.feedback-row { min-height:32px; text-align:center; font-weight:700; font-size:1rem; margin-top:4px; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

.quit-btn { position:fixed; top:16px; right:20px; background:transparent; border:1px solid rgba(255,255,255,.15); color:var(--muted); padding:6px 16px; border-radius:50px; font-size:.8rem; transition:all .2s; z-index:60; }
.quit-btn:hover { border-color:var(--coral); color:var(--coral); }

/* ===== RESULT SCREEN ===== */
#resultScreen { gap:16px; }
.result-title { font-family:'Zen Maru Gothic',sans-serif; font-size:clamp(2rem,6vw,3.5rem); font-weight:900; text-align:center; }
.result-rank {
  font-size:5rem; animation:rankBounce 1s cubic-bezier(.34,1.56,.64,1) .3s both;
}
@keyframes rankBounce { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
.result-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:480px; }
.r-stat { background:var(--card); border-radius:16px; padding:16px; text-align:center; }
.r-stat-num { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:700; }
.r-stat-label { font-size:.75rem; color:var(--muted); margin-top:4px; }
.result-name-row { display:flex; gap:10px; align-items:center; width:100%; max-width:480px; }
.name-input {
  flex:1; background:var(--card); border:2px solid var(--card2); border-radius:12px;
  padding:12px 16px; color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:1rem; outline:none;
  transition:border-color .2s;
}
.name-input:focus { border-color:var(--sakura); }
.name-input::placeholder { color:var(--muted); }
.save-btn {
  background:linear-gradient(135deg,var(--sakura),var(--purple));
  color:white; border:none; border-radius:12px; padding:12px 24px;
  font-weight:700; font-size:.95rem; transition:all .2s; white-space:nowrap;
}
.save-btn:hover { transform:scale(1.05); box-shadow:0 4px 20px var(--glow-pink); }
.result-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.retry-btn { background:var(--card); border:2px solid var(--card2); color:var(--text); border-radius:50px; padding:14px 32px; font-weight:700; transition:all .2s; }
.retry-btn:hover { border-color:var(--sakura); color:var(--sakura); }
.home-btn2 { background:transparent; border:2px solid var(--muted); color:var(--muted); border-radius:50px; padding:14px 32px; font-weight:700; transition:all .2s; }
.home-btn2:hover { border-color:var(--matcha); color:var(--matcha); }

/* ===== LEADERBOARD SCREEN ===== */
#lbScreen { justify-content:flex-start; padding-top:48px; padding-bottom:48px; gap:0; overflow-y:auto; }
.lb-header { text-align:center; margin-bottom:24px; width:100%; max-width:520px; }
.lb-crown { font-size:3rem; margin-bottom:8px; animation:rankBounce .8s cubic-bezier(.34,1.56,.64,1) both; }
.lb-title {
  font-family:'Zen Maru Gothic',sans-serif; font-size:1.8rem; font-weight:900;
  background:linear-gradient(135deg,var(--yuzu),var(--sakura));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.lb-subtitle { color:var(--muted); font-size:.85rem; }
.lb-list { width:100%; max-width:520px; display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.lb-row {
  background:var(--card);
  border-radius:16px; padding:14px 20px;
  display:flex; align-items:center; gap:14px;
  border:1px solid rgba(255,255,255,.07);
  transition:transform .2s, box-shadow .2s;
  animation:slideIn .3s ease both;
}
.lb-row:hover { transform:translateX(4px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
.lb-row.rank-1 { border-color:rgba(255,217,61,.35); background:linear-gradient(135deg,rgba(255,217,61,.08),var(--card)); }
.lb-row.rank-2 { border-color:rgba(167,139,250,.25); background:linear-gradient(135deg,rgba(167,139,250,.06),var(--card)); }
.lb-row.rank-3 { border-color:rgba(255,107,157,.2); background:linear-gradient(135deg,rgba(255,107,157,.06),var(--card)); }
@keyframes slideIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
.lb-rank-badge {
  font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:700;
  width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:var(--card2); color:var(--muted); flex-shrink:0;
}
.lb-row.rank-1 .lb-rank-badge { background:rgba(255,217,61,.2); color:var(--yuzu); }
.lb-row.rank-2 .lb-rank-badge { background:rgba(167,139,250,.2); color:var(--purple); }
.lb-row.rank-3 .lb-rank-badge { background:rgba(255,107,157,.2); color:var(--sakura); }
.lb-info { flex:1; min-width:0; }
.lb-name { font-weight:700; font-size:.95rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-meta { font-size:.72rem; color:var(--muted); margin-top:2px; }
.lb-right { text-align:right; flex-shrink:0; }
.lb-score { font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700; color:var(--yuzu); }
.lb-diff { font-size:.68rem; color:var(--muted); margin-top:2px; }
.back-btn {
  background:transparent; border:1.5px solid rgba(255,255,255,.15);
  color:var(--muted); border-radius:50px; padding:12px 32px;
  font-weight:700; font-size:.9rem; transition:all .2s;
}
.back-btn:hover { border-color:var(--sakura); color:var(--sakura); box-shadow:0 0 16px var(--glow-pink); }
.lb-empty {
  color:var(--muted); text-align:center; padding:48px 24px; font-size:.95rem;
  background:var(--card); border-radius:20px; border:1px dashed rgba(255,255,255,.08);
  width:100%; max-width:520px;
}
.lb-empty-icon { font-size:3rem; margin-bottom:12px; }
.lb-filter { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; width:100%; max-width:520px; }
.lb-filter-btn {
  padding:7px 18px; border-radius:50px;
  background:var(--card); border:1.5px solid rgba(255,255,255,.08);
  color:var(--muted); font-size:.78rem; font-weight:700; transition:all .2s;
}
.lb-filter-btn.active { border-color:var(--sakura); color:var(--sakura); background:rgba(255,107,157,.1); }
.lb-filter-btn:hover:not(.active) { border-color:rgba(255,255,255,.2); color:var(--text); }

/* SCREEN FLASH */
.flash { position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0;transition:opacity .15s; }
.flash.correct-flash { background:radial-gradient(ellipse,rgba(0,229,200,.25),transparent 70%); }
.flash.wrong-flash { background:radial-gradient(ellipse,rgba(255,107,107,.2),transparent 70%); }
.flash.show { opacity:1; }

/* SCORE POPUP */
.score-popup { position:fixed; pointer-events:none; z-index:300; font-family:'Orbitron',sans-serif; font-weight:700; animation:popupFly .8s ease forwards; }
@keyframes popupFly { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.4)} }

@media(max-width:480px) {
  .mode-grid { grid-template-columns:1fr 1fr; }
  .options-grid { grid-template-columns:1fr 1fr; }
  .result-stats { grid-template-columns:repeat(3,1fr); }
  .game-header { padding:12px 16px; }
  .hud-value { font-size:1rem; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>
<div class="stars" id="starsBg"></div>
<div id="particles"></div>
<div class="flash" id="flash"></div>

<!-- HOME -->
<div class="screen" id="homeScreen">
  <div class="home-logo">五十音<br>大冒險</div>
  <div class="home-sub">GO · GO · にほんご！</div>

  <div class="mode-grid" id="modeGrid">
    <button class="mode-btn selected" data-mode="hiragana" onclick="toggleMode(this)">
      <div class="mode-icon">ひ</div>
      <div class="mode-name">平假名</div>
      <div class="mode-count">46 + 濁音拗音</div>
    </button>
    <button class="mode-btn" data-mode="katakana" onclick="toggleMode(this)">
      <div class="mode-icon">カ</div>
      <div class="mode-name">片假名</div>
      <div class="mode-count">46 + 濁音拗音</div>
    </button>
  </div>

  <div class="diff-row">
    <button class="diff-btn selected" data-diff="normal" onclick="setDiff(this)">⚡ 普通</button>
    <button class="diff-btn" data-diff="hard" onclick="setDiff(this)">🔥 困難</button>
    <button class="diff-btn" data-diff="blitz" onclick="setDiff(this)">💀 閃電</button>
  </div>

  <button class="start-btn" onclick="startGame()">▶ 開始冒險！</button>
  <button class="leaderboard-link" onclick="showLeaderboard()">🏆 查看排行榜</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="gameScreen">
  <div class="game-header">
    <div class="hud-item">
      <div class="hud-label">分數</div>
      <div class="hud-value score-val" id="hudScore">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">連擊</div>
      <div class="hud-value streak-val" id="hudStreak">×0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">剩餘時間</div>
      <div class="hud-value timer-val" id="hudTimer">60</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">正確率</div>
      <div class="hud-value" id="hudAcc" style="color:var(--purple)">-</div>
    </div>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
  <div class="combo-banner" id="comboBanner">🔥 COMBO ×5</div>
  <button class="quit-btn" onclick="quitGame()">✕ 結束</button>

  <div class="question-area">
    <div class="progress-dots" id="progressDots"></div>
    <div class="kana-card">
      <span class="kana-char" id="kanaChar" style="color:var(--text)">あ</span>
      <div class="kana-type-hint" id="kanaHint">這個平假名的讀音是？</div>
    </div>
  </div>

  <div class="options-grid" id="optionsGrid"></div>
  <div class="feedback-row" id="feedbackRow"></div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="resultScreen">
  <div class="result-rank" id="resultRank">🏅</div>
  <div class="result-title" id="resultTitle">太厲害了！</div>
  <div class="result-stats">
    <div class="r-stat">
      <div class="r-stat-num" id="rScore" style="color:var(--yuzu)">0</div>
      <div class="r-stat-label">總分</div>
    </div>
    <div class="r-stat">
      <div class="r-stat-num" id="rAcc" style="color:var(--matcha)">0%</div>
      <div class="r-stat-label">正確率</div>
    </div>
    <div class="r-stat">
      <div class="r-stat-num" id="rStreak" style="color:var(--sakura)">0</div>
      <div class="r-stat-label">最高連擊</div>
    </div>
  </div>
  <div class="result-name-row">

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio(){if(!audioCtx){try{audioCtx=new AudioCtx();}catch(e){}}return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15){
  const a=getAudio();if(!a)return;
  const osc=a.createOscillator(),gain=a.createGain();
  osc.connect(gain);gain.connect(a.destination);
  osc.type=type;osc.frequency.value=freq;
  gain.gain.setValueAtTime(vol,a.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
  osc.start(a.currentTime);osc.stop(a.currentTime+dur);
}
function sfxCorrect(){playTone(523,.1);setTimeout(()=>playTone(659,.1),80);setTimeout(()=>playTone(784,.2),160);}
function sfxWrong(){playTone(200,.3,'sawtooth',.1);}
function sfxCombo(){playTone(880,.05);setTimeout(()=>playTone(988,.05),60);setTimeout(()=>playTone(1047,.15),120);}
function sfxTick(){playTone(440,.05,'square',.05);}

// ===== PARTICLES =====
const pEl=document.getElementById('particles');
function spawnParticles(x,y,isCorrect){
  const emojis=isCorrect?['✨','🌸','⭐','💫','🎉']:['💥','😅','❌'];
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*360, dist=60+Math.random()*60;
    const tx=Math.cos(angle*Math.PI/180)*dist, ty=Math.sin(angle*Math.PI/180)*dist-40;
    p.style.cssText=`left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px;--dur:${.6+Math.random()*.4}s;--fs:${1+Math.random()}rem`;
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    pEl.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function scorePopup(x,y,pts,isCorrect){
  const el=document.createElement('div');
  el.className='score-popup';
  el.style.cssText=`left:${x}px;top:${y-20}px;color:${isCorrect?'var(--matcha)':'var(--coral)'};font-size:1.3rem;`;
  el.textContent=isCorrect?`+${pts}`:`±0`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// ===== MODE/DIFF TOGGLES =====
function toggleMode(btn){
  const mode=btn.dataset.mode;
  if(selectedModes.includes(mode)){
    if(selectedModes.length===1)return;
    selectedModes=selectedModes.filter(m=>m!==mode);
    btn.classList.remove('selected');
  } else {
    selectedModes.push(mode);
    btn.classList.add('selected');
  }
}
function setDiff(btn){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  difficulty=btn.dataset.diff;
}

// ===== BUILD QUESTIONS =====
function buildQuestions(){
  let pool=[];
  selectedModes.forEach(m=>{
    if(DATA[m]) pool=[...pool,...DATA[m]];
  });
  pool=pool.filter((v,i,a)=>a.findIndex(x=>x.char===v.char)===i);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,40);
}

function getWrongOptions(correct, pool, n=3){
  const allAnswers=[...new Set(pool.map(q=>q.answer))].filter(a=>a!==correct);
  const shuffled=allAnswers.sort(()=>Math.random()-.5);
  return shuffled.slice(0,n);
}

// ===== START GAME =====
function startGame(){
  questions=buildQuestions();
  if(questions.length===0)return;
  qIndex=0; score=0; streak=0; maxStreak=0; correct=0; total=0;
  answered=false;
  const cfg=DIFF[difficulty];
  timerVal=cfg.time; timerMax=cfg.time;
  showScreen('gameScreen');
  buildProgressDots();
  showQuestion();
  startTimer();
}

function retryGame(){ startGame(); }

function buildProgressDots(){
  const el=document.getElementById('progressDots');
  el.innerHTML='';
  const count=Math.min(questions.length,20);
  for(let i=0;i<count;i++){
    const d=document.createElement('div');
    d.className='prog-dot'+(i===0?' current':'');
    d.id=`dot${i}`;
    el.appendChild(d);
  }
}

function showQuestion(){
  if(qIndex>=questions.length){ endGame(); return; }
  answered=false;
  const q=questions[qIndex];
  // char
  const charEl=document.getElementById('kanaChar');
  charEl.textContent=q.char;
  charEl.style.color=TYPE_COLORS[q.type]||'var(--text)';
  charEl.style.animation='none';charEl.offsetHeight;charEl.style.animation='charPop .35s cubic-bezier(.34,1.56,.64,1) both';
  // hint
  const hints={平假名:'這個平假名的讀音是？',片假名:'這個片假名的讀音是？',濁音:'這個濁音的讀音是？',半濁音:'這個半濁音的讀音是？',拗音:'這個拗音的讀音是？',濁拗音:'這個濁拗音的讀音是？',半濁拗音:'這個半濁拗音的讀音是？',動物:'這個漢字的中文意思是？',自然:'這個漢字的中文意思是？',動詞:'這個動詞的中文意思是？',形容詞:'這個形容詞的中文意思是？',日常:'這個日語的中文意思是？',交通:'這個單字的中文意思是？',地點:'這個地點的日語是？'};
  document.getElementById('kanaHint').textContent=hints[q.type]||'';
  // options
  const wrongs=getWrongOptions(q.answer,questions);
  const opts=[q.answer,...wrongs].sort(()=>Math.random()-.5);
  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.onclick=(e)=>checkAnswer(opt,q.answer,btn,e);
    grid.appendChild(btn);
  });
  document.getElementById('feedbackRow').textContent='';
  document.getElementById('feedbackRow').style.color='var(--text)';
  // progress
  updateDot();
}

function updateDot(){
  document.querySelectorAll('.prog-dot').forEach((d,i)=>{
    d.classList.remove('current');
    if(i<qIndex) { /* keep done class */ }
    else if(i===qIndex) d.classList.add('current');
  });
}

function checkAnswer(selected, correctAns, btn, e){
  if(answered) return;
  answered=true;
  total++;
  const isCorrect=(selected===correctAns);
  const cfg=DIFF[difficulty];
  const allBtns=document.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.disabled=true);

  if(isCorrect){
    correct++;
    streak++;
    if(streak>maxStreak)maxStreak=streak;
    const pts=cfg.pts + (streak>=3?cfg.bonus:0) + (streak>=5?cfg.bonus:0);
    score+=pts;
    btn.classList.add('correct-anim');
    document.getElementById('feedbackRow').textContent = streak>=5?`🔥 ${streak}連擊！超強！+${pts}分`:streak>=3?`✅ 連擊 ×${streak}！+${pts}分`:`✅ 正確！よくできました！+${pts}分`;
    document.getElementById('feedbackRow').style.color='var(--matcha)';
    sfxCorrect();
    if(streak>=3)sfxCombo();
    flashScreen('correct-flash');
    if(e){spawnParticles(e.clientX,e.clientY,true);scorePopup(e.clientX,e.clientY,pts,true);}
    if(streak>=3){ const cb=document.getElementById('comboBanner'); cb.textContent=`🔥 COMBO ×${streak}`; cb.classList.add('show'); setTimeout(()=>cb.classList.remove('show'),1500); }
    const dot=document.getElementById(`dot${Math.min(qIndex,19)}`);
    if(dot){dot.classList.remove('current');dot.classList.add('done-correct');}
  } else {
    streak=0;
    btn.classList.add('wrong-anim');
    allBtns.forEach(b=>{ if(b.textContent===correctAns)b.classList.add('correct-anim'); });
    document.getElementById('feedbackRow').textContent=`❌ 答案是「${correctAns}」，下次加油！`;
    document.getElementById('feedbackRow').style.color='var(--coral)';
    sfxWrong();
    flashScreen('wrong-flash');
    if(e){spawnParticles(e.clientX,e.clientY,false);scorePopup(e.clientX,e.clientY,0,false);}
    const dot=document.getElementById(`dot${Math.min(qIndex,19)}`);
    if(dot){dot.classList.remove('current');dot.classList.add('done-wrong');}
  }

  updateHUD();
  qIndex++;
  setTimeout(()=>{ if(timerVal>0)showQuestion(); },900);
}

function updateHUD(){
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudStreak').textContent=`×${streak}`;
  document.getElementById('hudAcc').textContent=total>0?Math.round(correct/total*100)+'%':'-';
  const timerEl=document.getElementById('hudTimer');
  timerEl.textContent=timerVal;
  timerEl.className='hud-value timer-val'+(timerVal<=10?' timer-warn':'');
  const pct=(timerVal/timerMax)*100;
  document.getElementById('timerBar').style.width=pct+'%';
  document.getElementById('timerBar').style.background=pct<25?'linear-gradient(90deg,var(--coral),#ff9f43)':pct<50?'linear-gradient(90deg,var(--yuzu),var(--sakura))':'linear-gradient(90deg,var(--matcha),var(--sakura))';
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerVal--;
    updateHUD();
    if(timerVal<=5&&timerVal>0)sfxTick();
    if(timerVal<=0){ clearInterval(timerInterval); endGame(); }
  },1000);
}

function flashScreen(cls){
  const f=document.getElementById('flash');
  f.className='flash '+cls+' show';
  setTimeout(()=>f.classList.remove('show'),300);
}

function quitGame(){ clearInterval(timerInterval); endGame(); }

// ===== END GAME =====
function endGame(){
  clearInterval(timerInterval);
  showScreen('resultScreen');
  const acc=total>0?Math.round(correct/total*100):0;
  document.getElementById('rScore').textContent=score;
  document.getElementById('rAcc').textContent=acc+'%';
  document.getElementById('rStreak').textContent=maxStreak;
  let rank='🥉',title='繼續加油！';
  if(acc>=90&&score>=500){rank='🏆';title='神級選手！完美！';}
  else if(acc>=80&&score>=300){rank='🥇';title='超厲害！優秀！';}
  else if(acc>=65&&score>=150){rank='🥈';title='不錯喔！繼續努力！';}
  document.getElementById('resultRank').textContent=rank;
  document.getElementById('resultTitle').textContent=title;
  // animate counters
  animCount('rScore',0,score,1200);
}

function animCount(id,from,to,dur){
  const el=document.getElementById(id);
  const start=performance.now();
  function step(now){
    const t=Math.min((now-start)/dur,1);
    el.textContent=Math.round(from+(to-from)*t);
    if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ===== LEADERBOARD =====
function loadLB(){ try{return JSON.parse(localStorage.getItem('kanaLB')||'[]');}catch(e){return [];} }
function saveLB(lb){ try{localStorage.setItem('kanaLB',JSON.stringify(lb));}catch(e){} }

function saveScore(){
  const name=document.getElementById('playerName').value.trim()||'匿名冒險家';
  const lb=loadLB();
  const modeLabel=selectedModes.join('+');
  lb.push({name,score,acc:total>0?Math.round(correct/total*100):0,streak:maxStreak,mode:modeLabel,diff:difficulty,date:new Date().toLocaleDateString('zh-TW')});
  lb.sort((a,b)=>b.score-a.score);
  saveLB(lb.slice(0,50));
  document.querySelector('.save-btn').textContent='✅ 已儲存！';
  document.querySelector('.save-btn').disabled=true;
}

function showLeaderboard(){
  showScreen('lbScreen');
  renderLB();
}

function renderLB(filter=null){
  const lb=loadLB();
  const list=document.getElementById('lbList');
  const modes=[...new Set(lb.map(e=>e.mode))];
  const filterEl=document.getElementById('lbFilter');
  filterEl.innerHTML='';
  if(modes.length>1){
    filterEl.innerHTML=`<button class="lb-filter-btn${filter===null?' active':''}" onclick="renderLB(null)">全部</button>`;
    modes.forEach(m=>{
      filterEl.innerHTML+=`<button class="lb-filter-btn${filter===m?' active':''}" onclick="renderLB('${m}')">${m}</button>`;
    });
  }

  const filtered=filter?lb.filter(e=>e.mode===filter):lb;
  list.innerHTML='';
  if(filtered.length===0){
    list.innerHTML=`<div class="lb-empty"><div class="lb-empty-icon">🎮</div>還沒有紀錄喔！<br>快去挑戰看看吧！</div>`;
    return;
  }
  const rankClasses=['rank-1','rank-2','rank-3'];
  const rankNums=['1','2','3'];
  filtered.slice(0,20).forEach((entry,i)=>{
    const row=document.createElement('div');
    row.className='lb-row'+(i<3?' '+rankClasses[i]:'');
    row.style.animationDelay=`${i*.05}s`;
    const diffLabel={normal:'普通',hard:'困難',blitz:'閃電'}[entry.diff]||entry.diff;
    row.innerHTML=`
      <div class="lb-rank-badge">${i<3?rankNums[i]:i+1}</div>
      <div class="lb-info">
        <div class="lb-name">${entry.name}</div>
        <div class="lb-meta">正確率 ${entry.acc}% · 最高連擊 ×${entry.streak} · ${entry.date}</div>
      </div>
      <div class="lb-right">
        <div class="lb-score">${entry.score}</div>
        <div class="lb-diff">${entry.mode} · ${diffLabel}</div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function goHome(){ clearInterval(timerInterval); showScreen('homeScreen'); }

// ===== INIT =====
showScreen('homeScreen');
</script>
